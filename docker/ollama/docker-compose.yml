version: '3.9'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: chaplain-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*        # allow cross-origin requests from your app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # One-shot service to pull the model on first start
  ollama-pull:
    image: ollama/ollama:latest
    container_name: chaplain-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        ollama pull llama3.2 &&
        echo 'Model ready'
      "
    restart: "no"

volumes:
  ollama_data:
    driver: local
