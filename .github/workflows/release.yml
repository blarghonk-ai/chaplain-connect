name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  # ─── SBOM Generation (Syft + Grype) ─────────────────────────
  sbom:
    name: Generate SBOM & Vulnerability Report
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for release asset upload
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: app/
          format: spdx-json
          output-file: chaplain-connect-sbom.spdx.json
          artifact-name: sbom-${{ github.ref_name }}.spdx.json

      - name: Scan SBOM for vulnerabilities with Grype
        uses: anchore/scan-action@v3
        id: grype
        with:
          sbom: chaplain-connect-sbom.spdx.json
          fail-build: false          # report only on releases — don't block
          output-format: sarif
          severity-cutoff: critical

      - name: Upload Grype SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

      - name: Run full Trivy scan for release report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app/
          format: json
          output: trivy-release-report.json
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Attach reports to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chaplain-connect-sbom.spdx.json
            trivy-release-report.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
