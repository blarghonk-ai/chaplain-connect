name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions by default — each job escalates only what it needs
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: '1.2.0'
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: Secret Scanning — runs first, blocks everything else if secrets found
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  secret-scan:
    name: 🔐 Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0   # full history required for accurate secret detection

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24edf40b495b5b852f73c  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: Dependency Review — flags new high/critical vulns introduced by a PR
# ─────────────────────────────────────────────────────────────────────────────
  dependency-review:
    name: 📦 Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0   # protect commercial usage

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: SAST — Static Application Security Testing (CodeQL)
# ─────────────────────────────────────────────────────────────────────────────
  codeql:
    name: 🔍 SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4: Semgrep — additional SAST rules tuned for Node/Next.js/TypeScript
# ─────────────────────────────────────────────────────────────────────────────
  semgrep:
    name: 🔍 SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    container:
      image: semgrep/semgrep:latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config=p/typescript \
            --config=p/react \
            --config=p/nextjs \
            --config=p/nodejs \
            --config=p/owasp-top-ten \
            --config=p/jwt \
            --config=p/sql-injection \
            --sarif --output=semgrep.sarif || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5: IaC Security — scan Dockerfiles and GitHub Actions workflows
# ─────────────────────────────────────────────────────────────────────────────
  checkov:
    name: 🏗️ IaC Security (Checkov)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,github_actions
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true   # report findings, don't block (tighten after baseline)

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov.sarif

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6: Vulnerability Scanning — Trivy scans filesystem and config files
# ─────────────────────────────────────────────────────────────────────────────
  trivy:
    name: 🛡️ Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app/
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif

      - name: Run Trivy config scan (misconfigurations)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          exit-code: '0'   # warn only on config findings

      - name: Upload Trivy config SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-config.sarif

# ─────────────────────────────────────────────────────────────────────────────
# JOB 7: Type Check & Lint
# ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: ✅ Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        working-directory: app
        run: bun tsc --noEmit

      - name: ESLint
        working-directory: app
        run: bun eslint src --max-warnings 0

      - name: Check for npm audit issues
        working-directory: app
        run: bun audit --audit-level=high || true   # informational for now

# ─────────────────────────────────────────────────────────────────────────────
# JOB 8: Build — verifies the app compiles cleanly
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [secret-scan, lint]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      GROQ_API_KEY: gsk_placeholder
      GROQ_MODEL: llama-3.3-70b-versatile
      STRIPE_SECRET_KEY: sk_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_PRICE_STARTER: price_placeholder
      STRIPE_PRICE_PROFESSIONAL: price_placeholder
      STRIPE_PRICE_ENTERPRISE: price_placeholder
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: app
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: app/.next/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 9: SBOM — generate Software Bill of Materials on every main push
# ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: 📋 SBOM Generation
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      id-token: write   # for OIDC signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: app/
          format: spdx-json
          output-file: chaplain-connect-sbom.spdx.json
          artifact-name: sbom-${{ github.sha }}.spdx.json

      - name: Scan SBOM with Grype
        uses: anchore/scan-action@v7
        with:
          sbom: chaplain-connect-sbom.spdx.json
          fail-build: false
          severity-cutoff: critical
          output-format: table

# ─────────────────────────────────────────────────────────────────────────────
# JOB 10: GRC Evidence Ingestion — posts CI results to the GRC dashboard
#
# Requires GitHub Secrets:
#   GRC_INGEST_TOKEN  — Bearer token matching GRC_INGEST_TOKEN in Vercel env
#   APP_URL           — Production URL, e.g. https://chaplain-connect.vercel.app
# ─────────────────────────────────────────────────────────────────────────────
  grc-ingest:
    name: 📊 GRC Evidence Ingestion
    runs-on: ubuntu-latest
    needs: [secret-scan, codeql, semgrep, checkov, trivy, lint, build, sbom]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.GRC_INGEST_TOKEN != '' &&
      secrets.APP_URL != ''
    permissions:
      security-events: read   # read Code Scanning alert counts
    steps:
      - name: Query Code Scanning alert counts
        id: alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          query_alerts() {
            local tool="$1"
            gh api --paginate \
              "/repos/${{ github.repository }}/code-scanning/alerts" \
              -f tool_name="${tool}" \
              -f state=open \
              --jq '.[].number' 2>/dev/null | wc -l | tr -d ' ' || echo 0
          }

          echo "codeql=$(query_alerts 'CodeQL')"       >> "$GITHUB_OUTPUT"
          echo "semgrep=$(query_alerts 'Semgrep OSS')" >> "$GITHUB_OUTPUT"
          echo "checkov=$(query_alerts 'Checkov')"     >> "$GITHUB_OUTPUT"
          echo "trivy=$(query_alerts 'Trivy')"         >> "$GITHUB_OUTPUT"

      - name: Build and POST evidence payload
        env:
          GRC_INGEST_TOKEN: ${{ secrets.GRC_INGEST_TOKEN }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PAYLOAD=$(jq -n \
            --arg run_id    "${{ github.run_id }}" \
            --arg run_url   "${RUN_URL}" \
            --arg sha       "${{ github.sha }}" \
            --arg ref       "${{ github.ref_name }}" \
            --arg workflow  "${{ github.workflow }}" \
            --arg secret_r  "${{ needs.secret-scan.result }}" \
            --arg codeql_r  "${{ needs.codeql.result }}" \
            --argjson codeql_n  "${{ steps.alerts.outputs.codeql || 0 }}" \
            --arg semgrep_r "${{ needs.semgrep.result }}" \
            --argjson semgrep_n "${{ steps.alerts.outputs.semgrep || 0 }}" \
            --arg checkov_r "${{ needs.checkov.result }}" \
            --argjson checkov_n "${{ steps.alerts.outputs.checkov || 0 }}" \
            --arg trivy_r   "${{ needs.trivy.result }}" \
            --argjson trivy_n   "${{ steps.alerts.outputs.trivy || 0 }}" \
            --arg lint_r    "${{ needs.lint.result }}" \
            --arg build_r   "${{ needs.build.result }}" \
            --arg sbom_r    "${{ needs.sbom.result }}" \
            '{
              run_id:     $run_id,
              run_url:    $run_url,
              commit_sha: $sha,
              ref:        $ref,
              workflow:   $workflow,
              jobs: [
                { tool: "gitleaks", outcome: $secret_r,  open_alerts: 0 },
                { tool: "codeql",   outcome: $codeql_r,  open_alerts: $codeql_n },
                { tool: "semgrep",  outcome: $semgrep_r, open_alerts: $semgrep_n },
                { tool: "checkov",  outcome: $checkov_r, open_alerts: $checkov_n },
                { tool: "trivy",    outcome: $trivy_r,   open_alerts: $trivy_n },
                { tool: "grype",    outcome: $sbom_r,    open_alerts: 0 },
                { tool: "lint",     outcome: $lint_r,    open_alerts: 0 },
                { tool: "build",    outcome: $build_r,   open_alerts: 0 }
              ]
            }')

          HTTP_STATUS=$(curl -s -o /tmp/grc_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${GRC_INGEST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${APP_URL}/api/grc/evidence/ingest")

          echo "HTTP status: ${HTTP_STATUS}"
          cat /tmp/grc_response.json

          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "::error::GRC ingest returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
